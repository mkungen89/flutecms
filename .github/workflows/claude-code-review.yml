name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.actor != 'claude[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review pull request with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request as a strict code reviewer for this repository.

            Priorities:
            - Correctness and behavioral regressions
            - Security issues and unsafe trust boundaries
            - Performance risks where they are material
            - Missing validation or tests for changed behavior

            Repository-specific rules:
            - Source is under app/Core, app/Modules, app/Themes, app/Helpers
            - Routes should use #[Route] attributes
            - Follow PHP 8.2 and PSR-12 conventions
            - Do not suggest broad refactors when a narrow fix is enough

            Review only the files changed in the PR.
            Prefer inline comments for concrete problems.
            If there are no actionable findings, leave a short approval-style summary comment saying no material issues were found.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
